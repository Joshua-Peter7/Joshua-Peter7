<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
<style>
  @keyframes appear { from{opacity:0} to{opacity:1} }
  @keyframes blink { 0%,100%{opacity:1} 49%{opacity:1} 50%,99%{opacity:0} }
  @keyframes mfall { 0%{transform:translateY(-20px);opacity:.6} 100%{transform:translateY(340px);opacity:0} }
  @keyframes borderPulse { 0%,100%{opacity:.5} 50%{opacity:1} }
  @keyframes scanV { 0%{transform:translateY(-320px)} 100%{transform:translateY(320px)} }
  .line { opacity:0; font-family:'Courier New',Courier,monospace; font-size:13px; }
  .l1  { animation: appear .01s .5s  forwards; }
  .l2  { animation: appear .01s .85s forwards; }
  .l3  { animation: appear .01s 1.1s forwards; }
  .l4  { animation: appear .01s 1.35s forwards; }
  .l5  { animation: appear .01s 1.6s  forwards; }
  .l6  { animation: appear .01s 1.85s forwards; }
  .l7  { animation: appear .01s 2.1s  forwards; }
  .l8  { animation: appear .01s 2.35s forwards; }
  .l9  { animation: appear .01s 2.6s  forwards; }
  .l10 { animation: appear .01s 2.85s forwards; }
  .l11 { animation: appear .01s 3.1s  forwards; }
  .l12 { animation: appear .01s 3.35s forwards; }
  .cursor { animation: blink 1s step-end infinite; font-family:'Courier New',Courier,monospace; font-size:14px; fill:#DC0000; }
  .mchar { animation: mfall linear infinite; font-family:monospace; font-size:12px; fill:#DC0000; }
  .m1 { animation-duration:4.2s; animation-delay:.0s; }
  .m2 { animation-duration:3.5s; animation-delay:1.2s; }
  .m3 { animation-duration:5.1s; animation-delay:.7s; }
  .m4 { animation-duration:3.8s; animation-delay:2.3s; }
  .m5 { animation-duration:4.7s; animation-delay:.4s; }
  .m6 { animation-duration:3.2s; animation-delay:1.8s; }
  .border-l { animation: borderPulse 2.5s ease-in-out infinite; }
  .scanV { animation: scanV 8s linear infinite; opacity:.025; }
  .kw   { fill:#FF6B6B; }
  .cls  { fill:#79C0FF; }
  .str  { fill:#FFD93D; }
  .prop { fill:#A5F3A5; }
  .punc { fill:#888; }
  .cmt  { fill:#444; }
  .plain{ fill:#ccc; }
</style>
<defs>
  <linearGradient id="abg" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#0b0b0b"/>
    <stop offset="100%" stop-color="#080808"/>
  </linearGradient>
</defs>

<!-- Background -->
<rect width="900" height="320" fill="url(#abg)"/>

<!-- Matrix chars -->
<text class="mchar m1" x="48"  y="0">1 0 1 0 1</text>
<text class="mchar m2" x="145" y="0">0 1 1 0 1</text>
<text class="mchar m3" x="285" y="0">1 1 0 1 0</text>
<text class="mchar m4" x="640" y="0">0 1 0 1 1</text>
<text class="mchar m5" x="750" y="0">1 0 1 1 0</text>
<text class="mchar m6" x="840" y="0">0 0 1 0 1</text>

<!-- Vertical scan -->
<rect class="scanV" x="0" y="0" width="900" height="50" fill="#FF2800"/>

<!-- Terminal window -->
<rect x="35" y="18" width="830" height="284" rx="9" fill="#0f0f0f" stroke="#222" stroke-width="1.5"/>

<!-- Title bar -->
<rect x="35" y="18" width="830" height="34" rx="9" fill="#161616"/>
<rect x="35" y="44" width="830" height="8" fill="#161616"/>

<!-- Traffic lights -->
<circle cx="63" cy="35" r="7.5" fill="#FF5F57"/>
<circle cx="85" cy="35" r="7.5" fill="#FFBD2E"/>
<circle cx="107" cy="35" r="7.5" fill="#28CA41"/>

<!-- Terminal title text -->
<text x="450" y="39" text-anchor="middle" font-family="monospace" font-size="12" fill="#555">joshua@ferrari-ml: ~/profile</text>

<!-- Left red accent border -->
<rect class="border-l" x="35" y="18" width="4" height="284" rx="2" fill="#DC0000"/>

<!-- Section label outside -->
<text x="50" y="12" font-family="monospace" font-size="9" fill="#DC0000" opacity=".6" letter-spacing="5">⚡ DRIVER PROFILE</text>

<!-- Prompt -->
<text x="62" y="82" font-family="'Courier New',Courier,monospace" font-size="13" fill="#DC0000">❯</text>
<text x="78" y="82" font-family="'Courier New',Courier,monospace" font-size="13" fill="#555">python3 profile.py</text>

<!-- Code lines -->
<text class="line l1" x="62" y="108">
  <tspan class="kw">class </tspan><tspan class="cls">MLEngineer</tspan><tspan class="punc">:</tspan>
</text>

<text class="line l2" x="62" y="128">
  <tspan class="punc" dx="20"></tspan><tspan class="prop">name     </tspan><tspan class="punc">= </tspan><tspan class="str">"Joshua Peter S"</tspan>
</text>

<text class="line l3" x="62" y="147">
  <tspan dx="20"></tspan><tspan class="prop">pronouns </tspan><tspan class="punc">= </tspan><tspan class="str">"he/him"</tspan>
</text>

<text class="line l4" x="62" y="166">
  <tspan dx="20"></tspan><tspan class="prop">location </tspan><tspan class="punc">= </tspan><tspan class="str">"Chennai, India"</tspan>
</text>

<text class="line l5" x="62" y="185">
  <tspan dx="20"></tspan><tspan class="prop">org      </tspan><tspan class="punc">= </tspan><tspan class="str">"The Vertical AI"</tspan>
</text>

<text class="line l6" x="62" y="204">
  <tspan dx="20"></tspan><tspan class="prop">goal     </tspan><tspan class="punc">= </tspan><tspan class="str">"Wanna become ML engineer — working hard for it"</tspan>
</text>

<text class="line l7" x="62" y="223">
  <tspan dx="20"></tspan><tspan class="prop">stack    </tspan><tspan class="punc">= [</tspan><tspan class="str">"PyTorch"</tspan><tspan class="punc">, </tspan><tspan class="str">"TensorFlow"</tspan><tspan class="punc">, </tspan><tspan class="str">"HuggingFace"</tspan><tspan class="punc">]</tspan>
</text>

<text class="line l8" x="62" y="242">
  <tspan dx="20"></tspan><tspan class="prop">fuel     </tspan><tspan class="punc">= [</tspan><tspan class="str">"Coffee"</tspan><tspan class="punc">, </tspan><tspan class="str">"Data"</tspan><tspan class="punc">, </tspan><tspan class="str">"GPUs"</tspan><tspan class="punc">]</tspan>
</text>

<text class="line l9" x="62" y="261">
  <tspan dx="0"></tspan><tspan class="plain"> </tspan>
</text>

<text class="line l10" x="62" y="261">
  <tspan dx="20"></tspan><tspan class="kw">def </tspan><tspan class="cls">philosophy</tspan><tspan class="punc">(self):</tspan>
</text>

<text class="line l11" x="62" y="280">
  <tspan dx="40"></tspan><tspan class="kw">return </tspan><tspan class="str">"Train fast. Iterate faster. Deploy with precision."</tspan>
</text>

<!-- Blinking cursor -->
<text class="cursor l12" x="62" y="298">▊</text>

<!-- Bottom output line -->
<text class="line l12" x="78" y="298" font-family="'Courier New',Courier,monospace" font-size="12" fill="#444">
  <tspan fill="#28CA41">✔</tspan><tspan fill="#555"> Profile loaded in 3.14s</tspan>
</text>
</svg>
