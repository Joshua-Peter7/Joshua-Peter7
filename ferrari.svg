<svg width="900" height="175" viewBox="0 0 900 175" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="trk" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#070707"/>
    <stop offset="50%" stop-color="#121212"/>
    <stop offset="100%" stop-color="#070707"/>
  </linearGradient>
  <linearGradient id="cbody" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#FF2800"/>
    <stop offset="55%" stop-color="#CC0000"/>
    <stop offset="100%" stop-color="#880000"/>
  </linearGradient>
  <linearGradient id="tire" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#2a2a2a"/>
    <stop offset="100%" stop-color="#111"/>
  </linearGradient>
  <filter id="cglow">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="exh">
    <feGaussianBlur stdDeviation="6"/>
  </filter>
  <radialGradient id="gglow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FF4400" stop-opacity=".7"/>
    <stop offset="100%" stop-color="#FF4400" stop-opacity="0"/>
  </radialGradient>
</defs>

<!-- BG (seamless dark) -->
<rect width="900" height="175" fill="url(#trk)"/>

<!-- Speed lines -->
<line x1="0" y1="22" x2="900" y2="22" stroke="#FF2800" stroke-width="1.5" opacity=".1" stroke-dasharray="200,700">
  <animate attributeName="stroke-dashoffset" from="0" to="-900" dur="0.9s" repeatCount="indefinite"/>
</line>
<line x1="0" y1="38" x2="900" y2="38" stroke="#FF6600" stroke-width=".8" opacity=".08" stroke-dasharray="120,780">
  <animate attributeName="stroke-dashoffset" from="0" to="-900" dur="0.65s" repeatCount="indefinite"/>
</line>
<line x1="0" y1="55" x2="900" y2="55" stroke="#FF2800" stroke-width="1" opacity=".09" stroke-dasharray="160,740">
  <animate attributeName="stroke-dashoffset" from="0" to="-900" dur="1.1s" repeatCount="indefinite"/>
</line>
<line x1="0" y1="70" x2="900" y2="70" stroke="#CC0000" stroke-width=".6" opacity=".06" stroke-dasharray="100,800">
  <animate attributeName="stroke-dashoffset" from="0" to="-900" dur="0.8s" repeatCount="indefinite"/>
</line>

<!-- Track surface -->
<rect x="0" y="108" width="900" height="48" fill="#0e0e0e"/>
<rect x="0" y="106" width="900" height="3" fill="#282828"/>
<rect x="0" y="153" width="900" height="3" fill="#282828"/>
<rect x="0" y="106" width="900" height="1.5" fill="#dddddd" opacity=".65"/>
<rect x="0" y="154" width="900" height="1.5" fill="#dddddd" opacity=".65"/>

<!-- Center line -->
<line x1="0" y1="131" x2="900" y2="131" stroke="#FFD700" stroke-width="1.5" stroke-dasharray="34,24" opacity=".35">
  <animate attributeName="stroke-dashoffset" from="0" to="-58" dur="0.32s" repeatCount="indefinite"/>
</line>

<!-- Kerb strips -->
<g opacity=".55">
  <rect x="0" y="155" width="30" height="17" fill="#DC0000"/>
  <rect x="30" y="155" width="30" height="17" fill="#fff"/>
  <rect x="60" y="155" width="30" height="17" fill="#DC0000"/>
  <rect x="90" y="155" width="30" height="17" fill="#fff"/>
  <rect x="120" y="155" width="30" height="17" fill="#DC0000"/>
  <rect x="150" y="155" width="30" height="17" fill="#fff"/>
  <rect x="180" y="155" width="30" height="17" fill="#DC0000"/>
  <rect x="210" y="155" width="30" height="17" fill="#fff"/>
  <rect x="240" y="155" width="30" height="17" fill="#DC0000"/>
  <rect x="270" y="155" width="30" height="17" fill="#fff"/>
  <rect x="300" y="155" width="30" height="17" fill="#DC0000"/>
  <rect x="330" y="155" width="30" height="17" fill="#fff"/>
  <rect x="360" y="155" width="30" height="17" fill="#DC0000"/>
  <rect x="390" y="155" width="30" height="17" fill="#fff"/>
  <rect x="420" y="155" width="30" height="17" fill="#DC0000"/>
  <rect x="450" y="155" width="30" height="17" fill="#fff"/>
  <rect x="480" y="155" width="30" height="17" fill="#DC0000"/>
  <rect x="510" y="155" width="30" height="17" fill="#fff"/>
  <rect x="540" y="155" width="30" height="17" fill="#DC0000"/>
  <rect x="570" y="155" width="30" height="17" fill="#fff"/>
  <rect x="600" y="155" width="30" height="17" fill="#DC0000"/>
  <rect x="630" y="155" width="30" height="17" fill="#fff"/>
  <rect x="660" y="155" width="30" height="17" fill="#DC0000"/>
  <rect x="690" y="155" width="30" height="17" fill="#fff"/>
  <rect x="720" y="155" width="30" height="17" fill="#DC0000"/>
  <rect x="750" y="155" width="30" height="17" fill="#fff"/>
  <rect x="780" y="155" width="30" height="17" fill="#DC0000"/>
  <rect x="810" y="155" width="30" height="17" fill="#fff"/>
  <rect x="840" y="155" width="30" height="17" fill="#DC0000"/>
  <rect x="870" y="155" width="30" height="17" fill="#fff"/>
</g>

<!-- === CAR === -->
<g>
  <animateTransform attributeName="transform" type="translate"
    from="-250,0" to="1140,0"
    dur="2.6s" repeatCount="indefinite"
    calcMode="spline" keyTimes="0;1" keySplines="0.18,0,0.28,1"/>

  <!-- Exhaust glow -->
  <ellipse cx="-6" cy="120" rx="30" ry="8" fill="#FF5500" filter="url(#exh)" opacity=".85">
    <animate attributeName="rx" values="30;42;24;36;30" dur="0.07s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".85;1;.6;.9;.85" dur="0.11s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="-18" cy="120" rx="16" ry="4.5" fill="#FFB300" filter="url(#exh)" opacity=".9">
    <animate attributeName="rx" values="16;24;12;20;16" dur="0.05s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="-34" cy="120" rx="8" ry="2.5" fill="#FF2800" opacity=".6">
    <animate attributeName="rx" values="8;14;6;11;8" dur="0.09s" repeatCount="indefinite"/>
  </ellipse>

  <!-- REAR WING -->
  <rect x="3" y="97" width="32" height="7" fill="#AA0000" rx="2"/>
  <rect x="5" y="90" width="28" height="5" fill="#CC0000" rx="1.5"/>
  <line x1="9" y1="90" x2="9" y2="104" stroke="#FF2800" stroke-width="2.5"/>
  <line x1="30" y1="90" x2="30" y2="104" stroke="#FF2800" stroke-width="2.5"/>
  <rect x="8" y="92" width="24" height="2.5" fill="#FF2800" opacity=".7"/>

  <!-- MAIN BODY underfloor -->
  <path d="M18,122 L192,122 L202,127 L185,136 L12,136 L4,129 Z" fill="#600000"/>
  <!-- Hull -->
  <path d="M15,101 L182,101 L196,108 L188,124 L10,124 L3,116 Z" fill="url(#cbody)" filter="url(#cglow)"/>
  <!-- Top shine -->
  <path d="M28,101 L165,101 L175,108 L24,108 Z" fill="#FF3300" opacity=".25"/>

  <!-- Bargeboards -->
  <path d="M32,118 L62,113 L62,124 L32,124 Z" fill="#880000"/>
  <path d="M120,115 L156,112 L156,124 L120,124 Z" fill="#880000"/>

  <!-- COCKPIT -->
  <path d="M78,101 L152,101 L160,92 L72,92 Z" fill="#6B0000"/>
  <rect x="82" y="88" width="62" height="13" rx="3" fill="#180000"/>
  <rect x="86" y="90" width="55" height="9" rx="2" fill="#090909"/>
  <rect x="88" y="91" width="51" height="6" rx="1" fill="#111" opacity=".9"/>
  <path d="M90,91 L136,91" stroke="#FF2800" stroke-width=".6" opacity=".35"/>

  <!-- AIR BOX -->
  <path d="M95,91 L110,84 L116,84 L131,91" fill="none" stroke="#660000" stroke-width="2.5"/>
  <rect x="100" y="79" width="26" height="10" fill="#0c0000" rx="2"/>

  <!-- SIDEPODS -->
  <rect x="27" y="104" width="65" height="15" rx="3.5" fill="#B50000"/>
  <rect x="116" y="104" width="60" height="15" rx="3.5" fill="#B50000"/>
  <!-- Cooling vents -->
  <line x1="42" y1="105" x2="37" y2="118" stroke="#880000" stroke-width="1.5"/>
  <line x1="51" y1="105" x2="46" y2="118" stroke="#880000" stroke-width="1.5"/>
  <line x1="60" y1="105" x2="55" y2="118" stroke="#880000" stroke-width="1.5"/>
  <!-- Ferrari shield -->
  <polygon points="78,99 84,103 84,109 78,113 72,109 72,103" fill="#FFD700" opacity=".85" transform="translate(0,5)"/>
  <polygon points="78,102 81,104 81,108 78,109 75,108 75,104" fill="#DC0000" transform="translate(0,5)"/>

  <!-- NOSE -->
  <path d="M182,108 L238,115 L234,124 L188,124 Z" fill="#990000"/>
  <path d="M182,108 L238,115 L238,113 L184,106 Z" fill="#CC0000" opacity=".5"/>
  <!-- Front wing -->
  <path d="M186,122 L240,119 L242,126 L184,129 Z" fill="#880000"/>
  <path d="M188,118 L236,115 L240,119 L186,122 Z" fill="#AA0000"/>
  <rect x="237" y="115" width="5" height="13" fill="#660000" rx="1"/>

  <!-- WHEELS rear-left -->
  <circle cx="32" cy="129" r="17" fill="#1a1a1a" stroke="#333" stroke-width="2.5"/>
  <circle cx="32" cy="129" r="12" fill="url(#tire)">
    <animateTransform attributeName="transform" type="rotate" from="0 32 129" to="360 32 129" dur="0.12s" repeatCount="indefinite"/>
  </circle>
  <circle cx="32" cy="129" r="5.5" fill="#444"/><circle cx="32" cy="129" r="2.5" fill="#666"/>

  <!-- rear-right -->
  <circle cx="54" cy="129" r="17" fill="#1a1a1a" stroke="#333" stroke-width="2.5"/>
  <circle cx="54" cy="129" r="12" fill="url(#tire)">
    <animateTransform attributeName="transform" type="rotate" from="0 54 129" to="360 54 129" dur="0.12s" repeatCount="indefinite"/>
  </circle>
  <circle cx="54" cy="129" r="5.5" fill="#444"/><circle cx="54" cy="129" r="2.5" fill="#666"/>

  <!-- front-left -->
  <circle cx="188" cy="129" r="15" fill="#1a1a1a" stroke="#333" stroke-width="2.5"/>
  <circle cx="188" cy="129" r="10" fill="url(#tire)">
    <animateTransform attributeName="transform" type="rotate" from="0 188 129" to="360 188 129" dur="0.12s" repeatCount="indefinite"/>
  </circle>
  <circle cx="188" cy="129" r="4.5" fill="#444"/><circle cx="188" cy="129" r="2" fill="#666"/>

  <!-- front-right -->
  <circle cx="207" cy="129" r="15" fill="#1a1a1a" stroke="#333" stroke-width="2.5"/>
  <circle cx="207" cy="129" r="10" fill="url(#tire)">
    <animateTransform attributeName="transform" type="rotate" from="0 207 129" to="360 207 129" dur="0.12s" repeatCount="indefinite"/>
  </circle>
  <circle cx="207" cy="129" r="4.5" fill="#444"/><circle cx="207" cy="129" r="2" fill="#666"/>

  <!-- Suspension -->
  <line x1="80" y1="118" x2="54" y2="129" stroke="#555" stroke-width="2"/>
  <line x1="92" y1="119" x2="32" y2="129" stroke="#555" stroke-width="2"/>
  <line x1="138" y1="116" x2="207" y2="129" stroke="#555" stroke-width="2"/>
  <line x1="154" y1="117" x2="188" y2="129" stroke="#555" stroke-width="2"/>

  <!-- Ground effect glow -->
  <ellipse cx="115" cy="135" rx="108" ry="6" fill="url(#gglow)" opacity=".55">
    <animate attributeName="opacity" values=".55;.9;.45;.75;.55" dur="0.2s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Ground sparks -->
  <circle cx="50" cy="141" r="2.5" fill="#FFD700">
    <animate attributeName="cy" values="141;147;141" dur="0.08s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2.5;.4;2.5" dur="0.18s" repeatCount="indefinite"/>
  </circle>
  <circle cx="90" cy="138" r="2" fill="#FF8C00">
    <animate attributeName="cy" values="138;145;138" dur="0.11s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;.3;2" dur="0.21s" repeatCount="indefinite"/>
  </circle>
  <circle cx="135" cy="140" r="3" fill="#FFD700">
    <animate attributeName="cy" values="140;147;140" dur="0.1s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3;.5;3" dur="0.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="165" cy="139" r="1.5" fill="#FF4500">
    <animate attributeName="cy" values="139;146;139" dur="0.09s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1.5;0;1.5" dur="0.15s" repeatCount="indefinite"/>
  </circle>
</g>

<!-- Checkered flags -->
<rect x="0"   y="0"  width="14" height="14" fill="#fff" opacity=".7"/>
<rect x="14"  y="0"  width="14" height="14" fill="#000" opacity=".7"/>
<rect x="0"   y="14" width="14" height="14" fill="#000" opacity=".7"/>
<rect x="14"  y="14" width="14" height="14" fill="#fff" opacity=".7"/>
<rect x="872" y="0"  width="14" height="14" fill="#fff" opacity=".7"/>
<rect x="886" y="0"  width="14" height="14" fill="#000" opacity=".7"/>
<rect x="872" y="14" width="14" height="14" fill="#000" opacity=".7"/>
<rect x="886" y="14" width="14" height="14" fill="#fff" opacity=".7"/>

<text x="450" y="60" text-anchor="middle" font-family="monospace" font-size="12" fill="#DC0000" opacity=".4" letter-spacing="8">SCUDERIA FERRARI — ML RACING TEAM</text>
<text x="450" y="78" text-anchor="middle" font-family="monospace" font-size="9" fill="#FF6600" opacity=".25" letter-spacing="5">MARANELLO · ITALY · BUILT ON DATA</text>
</svg>
