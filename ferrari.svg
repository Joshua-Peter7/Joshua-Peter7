<svg viewBox="0 0 900 160" xmlns="http://www.w3.org/2000/svg" width="900" height="160">
  <defs>
    <linearGradient id="trackGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#080808"/>
      <stop offset="50%" style="stop-color:#141414"/>
      <stop offset="100%" style="stop-color:#080808"/>
    </linearGradient>
    <linearGradient id="carBodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF2800"/>
      <stop offset="60%" style="stop-color:#CC0000"/>
      <stop offset="100%" style="stop-color:#880000"/>
    </linearGradient>
    <linearGradient id="tireGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a"/>
      <stop offset="100%" style="stop-color:#111"/>
    </linearGradient>
    <filter id="carGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="exhaustBlur">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <radialGradient id="groundGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF4400;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#FF4400;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- BG -->
  <rect width="900" height="160" fill="url(#trackGrad)"/>

  <!-- Speed lines -->
  <line x1="0" y1="25" x2="900" y2="25" stroke="#FF2800" stroke-width="1.5" opacity="0.12" stroke-dasharray="200,700">
    <animate attributeName="stroke-dashoffset" from="0" to="-900" dur="1s" repeatCount="indefinite"/>
  </line>
  <line x1="0" y1="42" x2="900" y2="42" stroke="#FF6600" stroke-width="0.8" opacity="0.10" stroke-dasharray="150,750">
    <animate attributeName="stroke-dashoffset" from="0" to="-900" dur="0.7s" repeatCount="indefinite"/>
  </line>
  <line x1="0" y1="58" x2="900" y2="58" stroke="#FF2800" stroke-width="1.2" opacity="0.10" stroke-dasharray="180,720">
    <animate attributeName="stroke-dashoffset" from="0" to="-900" dur="1.3s" repeatCount="indefinite"/>
  </line>
  <line x1="0" y1="72" x2="900" y2="72" stroke="#CC0000" stroke-width="0.6" opacity="0.08" stroke-dasharray="120,780">
    <animate attributeName="stroke-dashoffset" from="0" to="-900" dur="0.85s" repeatCount="indefinite"/>
  </line>

  <!-- TRACK SURFACE -->
  <rect x="0" y="102" width="900" height="44" fill="#0f0f0f"/>
  <rect x="0" y="100" width="900" height="3" fill="#2a2a2a"/>
  <rect x="0" y="143" width="900" height="3" fill="#2a2a2a"/>
  <rect x="0" y="100" width="900" height="1.5" fill="#dddddd" opacity="0.7"/>
  <rect x="0" y="144" width="900" height="1.5" fill="#dddddd" opacity="0.7"/>

  <!-- Center dashes -->
  <line x1="0" y1="123" x2="900" y2="123" stroke="#FFD700" stroke-width="1.5" stroke-dasharray="35,25" opacity="0.35">
    <animate attributeName="stroke-dashoffset" from="0" to="-60" dur="0.35s" repeatCount="indefinite"/>
  </line>

  <!-- KERB strips -->
  <rect x="0"   y="145" width="30" height="12" fill="#DC0000" opacity="0.5"/>
  <rect x="30"  y="145" width="30" height="12" fill="#ffffff" opacity="0.5"/>
  <rect x="60"  y="145" width="30" height="12" fill="#DC0000" opacity="0.5"/>
  <rect x="90"  y="145" width="30" height="12" fill="#ffffff" opacity="0.5"/>
  <rect x="120" y="145" width="30" height="12" fill="#DC0000" opacity="0.5"/>
  <rect x="150" y="145" width="30" height="12" fill="#ffffff" opacity="0.5"/>
  <rect x="180" y="145" width="30" height="12" fill="#DC0000" opacity="0.5"/>
  <rect x="210" y="145" width="30" height="12" fill="#ffffff" opacity="0.5"/>
  <rect x="240" y="145" width="30" height="12" fill="#DC0000" opacity="0.5"/>
  <rect x="270" y="145" width="30" height="12" fill="#ffffff" opacity="0.5"/>
  <rect x="300" y="145" width="30" height="12" fill="#DC0000" opacity="0.5"/>
  <rect x="330" y="145" width="30" height="12" fill="#ffffff" opacity="0.5"/>
  <rect x="360" y="145" width="30" height="12" fill="#DC0000" opacity="0.5"/>
  <rect x="390" y="145" width="30" height="12" fill="#ffffff" opacity="0.5"/>
  <rect x="420" y="145" width="30" height="12" fill="#DC0000" opacity="0.5"/>
  <rect x="450" y="145" width="30" height="12" fill="#ffffff" opacity="0.5"/>
  <rect x="480" y="145" width="30" height="12" fill="#DC0000" opacity="0.5"/>
  <rect x="510" y="145" width="30" height="12" fill="#ffffff" opacity="0.5"/>
  <rect x="540" y="145" width="30" height="12" fill="#DC0000" opacity="0.5"/>
  <rect x="570" y="145" width="30" height="12" fill="#ffffff" opacity="0.5"/>
  <rect x="600" y="145" width="30" height="12" fill="#DC0000" opacity="0.5"/>
  <rect x="630" y="145" width="30" height="12" fill="#ffffff" opacity="0.5"/>
  <rect x="660" y="145" width="30" height="12" fill="#DC0000" opacity="0.5"/>
  <rect x="690" y="145" width="30" height="12" fill="#ffffff" opacity="0.5"/>
  <rect x="720" y="145" width="30" height="12" fill="#DC0000" opacity="0.5"/>
  <rect x="750" y="145" width="30" height="12" fill="#ffffff" opacity="0.5"/>
  <rect x="780" y="145" width="30" height="12" fill="#DC0000" opacity="0.5"/>
  <rect x="810" y="145" width="30" height="12" fill="#ffffff" opacity="0.5"/>
  <rect x="840" y="145" width="30" height="12" fill="#DC0000" opacity="0.5"/>
  <rect x="870" y="145" width="30" height="12" fill="#ffffff" opacity="0.5"/>

  <!-- === THE CAR === -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      from="-240,0" to="1120,0"
      dur="2.8s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;1" keySplines="0.2,0,0.3,1"/>

    <!-- EXHAUST GLOW -->
    <ellipse cx="-5" cy="112" rx="28" ry="7" fill="#FF5500" filter="url(#exhaustBlur)" opacity="0.8">
      <animate attributeName="rx" values="28;38;22;32;28" dur="0.07s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;1;0.6;0.9;0.8" dur="0.11s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="-15" cy="112" rx="16" ry="4" fill="#FFB300" filter="url(#exhaustBlur)" opacity="0.9">
      <animate attributeName="rx" values="16;22;12;18;16" dur="0.05s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="-30" cy="112" rx="8" ry="2.5" fill="#FF2800" opacity="0.5">
      <animate attributeName="rx" values="8;13;6;10;8" dur="0.09s" repeatCount="indefinite"/>
    </ellipse>

    <!-- REAR WING -->
    <rect x="3" y="91" width="30" height="6" fill="#AA0000" rx="1.5"/>
    <rect x="5" y="85" width="26" height="4" fill="#CC0000" rx="1"/>
    <line x1="8" y1="85" x2="8" y2="97" stroke="#FF2800" stroke-width="2"/>
    <line x1="28" y1="85" x2="28" y2="97" stroke="#FF2800" stroke-width="2"/>
    <rect x="7" y="87" width="22" height="2" fill="#FF2800" opacity="0.7"/>

    <!-- MAIN BODY -->
    <path d="M18,116 L185,116 L195,120 L180,128 L12,128 L5,122 Z" fill="#700000"/>
    <path d="M15,96 L175,96 L188,103 L182,118 L10,118 L4,111 Z" fill="url(#carBodyGrad)" filter="url(#carGlow)"/>
    <path d="M30,96 L160,96 L168,103 L25,103 Z" fill="#FF3300" opacity="0.3"/>

    <!-- Bargeboards -->
    <path d="M35,112 L60,108 L60,118 L35,118 Z" fill="#880000"/>
    <path d="M120,110 L150,107 L150,118 L120,118 Z" fill="#880000"/>

    <!-- COCKPIT -->
    <path d="M78,96 L148,96 L155,87 L72,87 Z" fill="#6B0000"/>
    <rect x="82" y="84" width="58" height="12" rx="3" fill="#1a0000"/>
    <rect x="85" y="86" width="52" height="8" rx="2" fill="#0a0a0a"/>
    <rect x="87" y="87" width="48" height="5" rx="1" fill="#111111" opacity="0.9"/>
    <path d="M88,87 L130,87" stroke="#FF2800" stroke-width="0.5" opacity="0.4"/>

    <!-- ENGINE AIR BOX -->
    <path d="M93,87 L107,81 L113,81 L127,87" fill="none" stroke="#660000" stroke-width="2"/>
    <rect x="97" y="76" width="26" height="9" fill="#0d0000" rx="2"/>
    <rect x="99" y="78" width="22" height="5" fill="#1a0000" rx="1"/>

    <!-- SIDE PODS -->
    <rect x="28" y="99" width="62" height="14" rx="3" fill="#B80000"/>
    <rect x="113" y="99" width="58" height="14" rx="3" fill="#B80000"/>
    <line x1="42" y1="100" x2="38" y2="112" stroke="#880000" stroke-width="1.5"/>
    <line x1="50" y1="100" x2="46" y2="112" stroke="#880000" stroke-width="1.5"/>
    <line x1="58" y1="100" x2="54" y2="112" stroke="#880000" stroke-width="1.5"/>
    <!-- Ferrari Shield -->
    <polygon points="78,-101 83,-97 83,-92 78,-89 73,-92 73,-97" fill="#FFD700" opacity="0.85" transform="translate(0,205)"/>
    <polygon points="78,-104 80,-102 80,-99 78,-98 76,-99 76,-102" fill="#DC0000" transform="translate(0,205)"/>

    <!-- NOSE -->
    <path d="M175,103 L228,110 L225,118 L182,118 Z" fill="#990000"/>
    <path d="M175,103 L228,110 L228,108 L178,101 Z" fill="#CC0000" opacity="0.5"/>
    <path d="M178,116 L232,113 L234,119 L176,122 Z" fill="#880000"/>
    <path d="M180,112 L230,109 L232,113 L178,116 Z" fill="#AA0000"/>
    <rect x="229" y="109" width="4" height="12" fill="#660000" rx="1"/>

    <!-- REAR LEFT WHEEL -->
    <circle cx="32" cy="122" r="16" fill="#1a1a1a" stroke="#333333" stroke-width="2"/>
    <circle cx="32" cy="122" r="11" fill="url(#tireGrad)">
      <animateTransform attributeName="transform" type="rotate" from="0 32 122" to="360 32 122" dur="0.13s" repeatCount="indefinite"/>
    </circle>
    <circle cx="32" cy="122" r="5" fill="#444444"/>
    <circle cx="32" cy="122" r="2.5" fill="#666666"/>

    <!-- REAR RIGHT WHEEL -->
    <circle cx="52" cy="122" r="16" fill="#1a1a1a" stroke="#333333" stroke-width="2"/>
    <circle cx="52" cy="122" r="11" fill="url(#tireGrad)">
      <animateTransform attributeName="transform" type="rotate" from="0 52 122" to="360 52 122" dur="0.13s" repeatCount="indefinite"/>
    </circle>
    <circle cx="52" cy="122" r="5" fill="#444444"/>
    <circle cx="52" cy="122" r="2.5" fill="#666666"/>

    <!-- FRONT LEFT WHEEL -->
    <circle cx="182" cy="122" r="14" fill="#1a1a1a" stroke="#333333" stroke-width="2"/>
    <circle cx="182" cy="122" r="9" fill="url(#tireGrad)">
      <animateTransform attributeName="transform" type="rotate" from="0 182 122" to="360 182 122" dur="0.13s" repeatCount="indefinite"/>
    </circle>
    <circle cx="182" cy="122" r="4" fill="#444444"/>
    <circle cx="182" cy="122" r="2" fill="#666666"/>

    <!-- FRONT RIGHT WHEEL -->
    <circle cx="200" cy="122" r="14" fill="#1a1a1a" stroke="#333333" stroke-width="2"/>
    <circle cx="200" cy="122" r="9" fill="url(#tireGrad)">
      <animateTransform attributeName="transform" type="rotate" from="0 200 122" to="360 200 122" dur="0.13s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="122" r="4" fill="#444444"/>
    <circle cx="200" cy="122" r="2" fill="#666666"/>

    <!-- SUSPENSION -->
    <line x1="78" y1="113" x2="52" y2="122" stroke="#555555" stroke-width="2"/>
    <line x1="90" y1="114" x2="32" y2="122" stroke="#555555" stroke-width="2"/>
    <line x1="135" y1="111" x2="200" y2="122" stroke="#555555" stroke-width="2"/>
    <line x1="150" y1="112" x2="182" y2="122" stroke="#555555" stroke-width="2"/>

    <!-- GROUND EFFECT GLOW -->
    <ellipse cx="112" cy="127" rx="100" ry="5" fill="url(#groundGlow)" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.8;0.4;0.7;0.5" dur="0.2s" repeatCount="indefinite"/>
    </ellipse>

    <!-- SPARKS -->
    <circle cx="55" cy="133" r="2.5" fill="#FFD700">
      <animate attributeName="cy" values="133;138;133" dur="0.08s" repeatCount="indefinite"/>
      <animate attributeName="r" values="2.5;0.5;2.5" dur="0.18s" repeatCount="indefinite"/>
    </circle>
    <circle cx="90" cy="130" r="2" fill="#FF8C00">
      <animate attributeName="cy" values="130;136;130" dur="0.12s" repeatCount="indefinite"/>
      <animate attributeName="r" values="2;0.3;2" dur="0.22s" repeatCount="indefinite"/>
    </circle>
    <circle cx="130" cy="132" r="3" fill="#FFD700">
      <animate attributeName="cy" values="132;138;132" dur="0.1s" repeatCount="indefinite"/>
      <animate attributeName="r" values="3;0.5;3" dur="0.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="160" cy="131" r="1.5" fill="#FF4500">
      <animate attributeName="cy" values="131;137;131" dur="0.09s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.5;0;1.5" dur="0.15s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Checkered flags -->
  <rect x="0"   y="0"  width="12" height="12" fill="#ffffff" opacity="0.7"/>
  <rect x="12"  y="0"  width="12" height="12" fill="#000000" opacity="0.7"/>
  <rect x="0"   y="12" width="12" height="12" fill="#000000" opacity="0.7"/>
  <rect x="12"  y="12" width="12" height="12" fill="#ffffff" opacity="0.7"/>
  <rect x="876" y="0"  width="12" height="12" fill="#ffffff" opacity="0.7"/>
  <rect x="888" y="0"  width="12" height="12" fill="#000000" opacity="0.7"/>
  <rect x="876" y="12" width="12" height="12" fill="#000000" opacity="0.7"/>
  <rect x="888" y="12" width="12" height="12" fill="#ffffff" opacity="0.7"/>

  <!-- Labels -->
  <text x="450" y="55" text-anchor="middle" font-family="monospace" font-size="13" fill="#DC0000" opacity="0.45" letter-spacing="8">SCUDERIA FERRARI — ML RACING TEAM</text>
  <text x="450" y="73" text-anchor="middle" font-family="monospace" font-size="9" fill="#FF6600" opacity="0.3" letter-spacing="5">MARANELLO · EST. 1950 · BUILT ON DATA</text>
</svg>
