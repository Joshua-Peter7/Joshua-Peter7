<svg width="900" height="130" viewBox="0 0 900 130" xmlns="http://www.w3.org/2000/svg">
<style>
  @keyframes wave1 { 0%,100%{d:path("M0,60 C150,30 300,90 450,60 C600,30 750,90 900,60 L900,130 L0,130 Z")} 50%{d:path("M0,60 C150,90 300,30 450,60 C600,90 750,30 900,60 L900,130 L0,130 Z")} }
  @keyframes wave2 { 0%,100%{d:path("M0,75 C120,50 280,100 450,75 C620,50 780,100 900,75 L900,130 L0,130 Z")} 50%{d:path("M0,75 C120,100 280,50 450,75 C620,100 780,50 900,75 L900,130 L0,130 Z")} }
  @keyframes floatSpark { 0%{transform:translateY(0) scale(1);opacity:.9} 100%{transform:translateY(-90px) scale(0);opacity:0} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  @keyframes topPulse { 0%,100%{opacity:.6} 50%{opacity:1} }
  .w1 { animation: wave1 4s ease-in-out infinite; }
  .w2 { animation: wave2 3s ease-in-out infinite; }
  .sp1 { animation: floatSpark 2.5s ease-out infinite; animation-delay:.0s; }
  .sp2 { animation: floatSpark 3s ease-out infinite; animation-delay:.6s; }
  .sp3 { animation: floatSpark 2s ease-out infinite; animation-delay:1.1s; }
  .sp4 { animation: floatSpark 2.8s ease-out infinite; animation-delay:1.6s; }
  .sp5 { animation: floatSpark 3.2s ease-out infinite; animation-delay:.3s; }
  .sp6 { animation: floatSpark 2.3s ease-out infinite; animation-delay:2.0s; }
  .txt { animation: fadeIn .8s ease .3s both; }
  .tbar { animation: topPulse 2s ease-in-out infinite; }
</style>
<defs>
  <linearGradient id="fgw" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#880000"/>
    <stop offset="35%" stop-color="#DC0000"/>
    <stop offset="65%" stop-color="#FF2800"/>
    <stop offset="100%" stop-color="#880000"/>
  </linearGradient>
  <linearGradient id="fgw2" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#5a0000"/>
    <stop offset="50%" stop-color="#AA0000"/>
    <stop offset="100%" stop-color="#5a0000"/>
  </linearGradient>
</defs>

<!-- BG -->
<rect width="900" height="130" fill="#080808"/>

<!-- Top border -->
<rect class="tbar" x="0" y="0" width="900" height="3" fill="#DC0000"/>

<!-- Waves -->
<path class="w2" d="M0,75 C120,50 280,100 450,75 C620,50 780,100 900,75 L900,130 L0,130 Z" fill="url(#fgw2)" opacity=".6"/>
<path class="w1" d="M0,60 C150,30 300,90 450,60 C600,30 750,90 900,60 L900,130 L0,130 Z" fill="url(#fgw)"/>

<!-- Sparks floating up from wave -->
<circle class="sp1" cx="120" cy="60" r="3" fill="#FFD700"/>
<circle class="sp2" cx="250" cy="55" r="2" fill="#FF6600"/>
<circle class="sp3" cx="450" cy="58" r="3.5" fill="#FFD700"/>
<circle class="sp4" cx="640" cy="55" r="2.5" fill="#FF8C00"/>
<circle class="sp5" cx="780" cy="62" r="2" fill="#FFD700"/>
<circle class="sp6" cx="350" cy="60" r="2" fill="#FF4500"/>

<!-- Text -->
<text class="txt" x="450" y="45" text-anchor="middle"
  font-family="monospace" font-size="11" fill="#ccc" letter-spacing="3" opacity=".7">
  🏎️ Built with Ferrari passion · Powered by data · Deployed at race speed
</text>
<text class="txt" x="450" y="62" text-anchor="middle"
  font-family="monospace" font-size="9" fill="#666" letter-spacing="4">
  JOSHUA PETER S · SCUDERIA FERRARI ML · CHENNAI
</text>
</svg>
